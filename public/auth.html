<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futurense University | Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0b0b0b 100%);
        }

        .auth-card {
            width: 400px;
            padding: 40px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: cardSlide 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 5px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: var(--accent-gold);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-gold);
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
        }
        body { background-color: var(--primary-bg) !important; }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 30px;">
                
                <h2 style="font-size: 1.4rem; color: var(--accent-gold);">Student Portal</h2>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- Sign In Form -->
            <form id="signInForm" class="auth-form active">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="name@futurense.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-gold auth-btn">Secure Login</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signUpForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPass" required placeholder="••••••••">
                </div>
                <!-- Optional: Role selector for demo -->
                <div class="form-group">
                    <label>I am a</label>
                    <select id="regRole"
                        style="background: var(--card-bg); color: var(--text-primary); border: 1px solid var(--border-color); -webkit-appearance: none;">
                        <option value="student">Student</option>
                        <option value="teacher">Faculty Member</option>
                    </select>
                </div>
                <button type="submit" class="btn-gold auth-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));

            if (type === 'signin') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('signInForm').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('signUpForm').classList.add('active');
            }
        }

        // Login Handler
        document.getElementById('signInForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('studentId', data.studentId);
                    localStorage.setItem('userName', data.name);
                    window.location.href = '/';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        });

        // Register Handler
        document.getElementById('signUpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            try {
                const response = await fetch('http://localhost:5000/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Registration successful! Please sign in.');
                    switchTab('signin');
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (err) {
                alert('Connection error');
            }
        });
    </script>
</body>

</html>
