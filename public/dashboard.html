<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURENSE UNIVERSITY - Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: #0B0B0B; color: #F5F5F5; font-family: 'Inter', sans-serif;">
    <div class="container" style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
        <div class="nav-bar"
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2A2A2A; padding-bottom: 20px; margin-bottom: 40px;">
            
            <div style="text-align: right;">
                <h2
                    style="font-family: 'Playfair Display', serif; letter-spacing: 0.1em; text-transform: uppercase; font-size: 1rem; margin-bottom: 5px;">
                    Welcome, <span id="studentNameDisplay">Student</span></h2>
                <button class="logout-btn secondary" id="logoutBtn"
                    style="background: transparent; color: #CFCFCF; border: 1px solid #2A2A2A; padding: 5px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.6rem; letter-spacing: 0.1em;">Logout</button>
            </div>
        </div>

        <div class="dashboard-card"
            style="background: #1A1A1A; border: 1px solid #2A2A2A; padding: 40px; border-radius: 2px;">
            <h1
                style="font-family: 'Playfair Display', serif; margin-bottom: 30px; border-bottom: 1px solid #2A2A2A; padding-bottom: 15px;">
                Fee Remittance Summary</h1>
            <div class="stats-grid"
                style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;">
                <div class="stat-item" style="border-left: 1px solid #2A2A2A; padding-left: 20px;">
                    <h3 style="font-size: 0.7rem; text-transform: uppercase; color: #CFCFCF; margin-bottom: 10px;">Total
                        Charges</h3>
                    <div class="value" id="totalFees" style="font-size: 1.8rem; font-weight: 700;">₹0</div>
                </div>
                <div class="stat-item" style="border-left: 1px solid #2A2A2A; padding-left: 20px;">
                    <h3 style="font-size: 0.7rem; text-transform: uppercase; color: #CFCFCF; margin-bottom: 10px;">
                        Amount Remitted</h3>
                    <div class="value" id="paidAmount" style="font-size: 1.8rem; font-weight: 700;">₹0</div>
                </div>
                <div class="stat-item" style="border-left: 1px solid #2A2A2A; padding-left: 20px;">
                    <h3 style="font-size: 0.7rem; text-transform: uppercase; color: #CFCFCF; margin-bottom: 10px;">
                        Outstanding Balance</h3>
                    <div class="value" id="pendingAmount" style="font-size: 1.8rem; font-weight: 700;">₹0</div>
                </div>
            </div>

            <div id="paymentSection">
                <div class="form-group" id="amountInputGroup" style="margin-bottom: 25px;">
                    <label for="payAmount"
                        style="display: block; font-size: 0.7rem; text-transform: uppercase; color: #CFCFCF; margin-bottom: 10px;">Amount
                        to Remit (₹)</label>
                    <input type="number" id="payAmount" min="1" placeholder="Enter amount"
                        style="width: 100%; background: #0B0B0B; border: 1px solid #2A2A2A; color: #F5F5F5; padding: 15px; font-family: inherit;">
                </div>
                <button id="payNowBtn"
                    style="width: 100%; background: #F5F5F5; color: #0B0B0B; border: none; padding: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;">Generate
                    QR Instrument</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const studentId = localStorage.getItem('studentId');
        const studentName = localStorage.getItem('studentName');

        if (!token) window.location.href = '/index.html';

        document.getElementById('studentNameDisplay').textContent = studentName;

        async function fetchFees() {
            try {
                const response = await fetch(`/fees/${studentId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('totalFees').textContent = `₹${data.total_fees}`;
                    document.getElementById('paidAmount').textContent = `₹${data.paid_amount}`;
                    document.getElementById('pendingAmount').textContent = `₹${data.pending_amount}`;

                    if (data.pending_amount <= 0) {
                        document.getElementById('paymentSection').innerHTML = '<p style="color: var(--success); text-align: center; font-weight: 600;">All fees paid!</p>';
                    } else {
                        document.getElementById('payAmount').max = data.pending_amount;
                        document.getElementById('payAmount').value = data.pending_amount;
                    }
                } else {
                    alert('Error: ' + data.message);
                    if (response.status === 403) logout();
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('payNowBtn').addEventListener('click', () => {
            const amount = document.getElementById('payAmount').value;
            if (!amount || amount <= 0) return alert('Please enter a valid amount');

            localStorage.setItem('pendingPaymentAmount', amount);
            window.location.href = '/payment.html';
        });

        document.getElementById('logoutBtn').addEventListener('click', logout);

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        fetchFees();
    </script>
</body>

</html>
